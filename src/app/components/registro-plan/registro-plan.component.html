<app-menu></app-menu>

<main class="form-shell">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-icon mat-card-avatar>workspace_premium</mat-icon>
      <mat-card-title>Nuevo plan</mat-card-title>
      <mat-card-subtitle>Define el precio y duracion disponibles en el catalogo.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="registrarPlan()" class="data-form">
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name" placeholder="Plan Hogar">
          <mat-error>El nombre es obligatorio.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Descripcion</mat-label>
          <textarea matInput rows="3" formControlName="description"></textarea>
          <mat-error>La descripcion es obligatoria.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Precio</mat-label>
          <input matInput type="number" min="0" step="0.01" formControlName="price">
          <mat-error>Ingresa un precio valido.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Duracion en dias</mat-label>
          <input matInput type="number" min="1" formControlName="durationDays">
          <mat-error>Ingresa una duracion valida.</mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/planes">Cancelar</button>
          <button mat-flat-button color="primary" type="submit">
            <mat-icon>save</mat-icon>
            Registrar plan
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</main>
