<app-menu></app-menu>

<main class="form-shell">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-icon mat-card-avatar>edit</mat-icon>
      <mat-card-title>Editar plan</mat-card-title>
      <mat-card-subtitle>Vista acoplada a <code>PUT /plans/{{ idPlan }}</code>.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="actualizarPlan()" class="data-form">
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name">
          <mat-error>El nombre es obligatorio.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Descripcion</mat-label>
          <textarea matInput rows="3" formControlName="description"></textarea>
          <mat-error>La descripcion es obligatoria.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Precio</mat-label>
          <input matInput type="number" min="0" step="0.01" formControlName="price">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Duracion en dias</mat-label>
          <input matInput type="number" min="1" formControlName="durationDays">
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" [routerLink]="['/planes', idPlan]">Cancelar</button>
          <button mat-flat-button color="primary" type="submit">
            <mat-icon>save</mat-icon>
            Guardar cambios
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</main>
