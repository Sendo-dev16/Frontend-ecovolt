<app-menu></app-menu>

<main class="page-shell">
  <section class="page-header">
    <div>
      <p class="eyebrow">Endpoint admin</p>
      <h1>Inventario global de viviendas</h1>
      <p>Vista acoplada a <code>GET /homes/admin/all</code>.</p>
    </div>
    <a mat-flat-button color="primary" routerLink="/viviendas/nueva">
      <mat-icon>add_home</mat-icon>
      Nueva vivienda
    </a>
  </section>

  <mat-card class="table-card">
    <mat-card-content>
      <table mat-table [dataSource]="homes" *ngIf="homes.length; else empty">
        <ng-container matColumnDef="alias">
          <th mat-header-cell *matHeaderCellDef>Alias</th>
          <td mat-cell *matCellDef="let home">{{ home.alias }}</td>
        </ng-container>
        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef>Direccion</th>
          <td mat-cell *matCellDef="let home">{{ home.address }}</td>
        </ng-container>
        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef>Ciudad</th>
          <td mat-cell *matCellDef="let home">{{ home.city }}</td>
        </ng-container>
        <ng-container matColumnDef="ownerName">
          <th mat-header-cell *matHeaderCellDef>Propietario</th>
          <td mat-cell *matCellDef="let home">{{ home.ownerName || 'Sin dato' }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let home">
            <a mat-button color="primary" [routerLink]="['/viviendas', home.idHome]">Detalle</a>
            <a mat-button [routerLink]="['/viviendas', home.idHome, 'editar']">Editar</a>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <ng-template #empty>
        <p class="empty-inline">No hay viviendas para mostrar.</p>
      </ng-template>
    </mat-card-content>
  </mat-card>
</main>
