<mat-toolbar class="app-toolbar" *ngIf="isLogged">
  <!-- LOGO -->
  <a class="brand" routerLink="/dashboard">
    <mat-icon>bolt</mat-icon>
    <span>EcoVolt</span>
  </a>

  <!-- NAVEGACIÓN PRINCIPAL (CLIENTE/GENERAL) -->
  <nav class="nav-links">
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
    
    <button mat-button [routerLink]="['/catalogoPlanes']" routerLinkActive="active-link">
      <mat-icon>workspace_premium</mat-icon> Planes
    </button>

    <a mat-button routerLink="/viviendas/nueva" routerLinkActive="active-link">Vivienda</a>
    <a mat-button routerLink="/ambientes/nuevo" routerLinkActive="active-link">Ambiente</a>
    <a mat-button routerLink="/dispositivos/nuevo" routerLinkActive="active-link">Dispositivo</a>
  </nav>

  <span class="toolbar-spacer"></span>

  <!-- NAVEGACIÓN ADMIN (GESTIÓN) -->
  <nav class="nav-links admin-section" *ngIf="isAdmin">
    <div class="admin-divider"></div>
    <a mat-button color="accent" routerLink="/admin/viviendas" routerLinkActive="active-link" matTooltip="Gestión Global de Viviendas">
      <mat-icon>admin_panel_settings</mat-icon> Viviendas
    </a>
    <a mat-button color="accent" routerLink="/planes" routerLinkActive="active-link" matTooltip="Gestión del Catálogo">
      <mat-icon>list_alt</mat-icon> Gestión Planes
    </a>
  </nav>

  <!-- PERFIL Y SALIDA -->
  <div class="user-pill">
    <mat-icon>account_circle</mat-icon>
    <span>{{ fullName }}</span>
  </div>

  <button mat-icon-button color="warn" (click)="onLogOut()" matTooltip="Cerrar Sesión">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>
